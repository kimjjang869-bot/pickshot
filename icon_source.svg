<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient - deep dark with subtle blue tint -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E2A3A"/>
      <stop offset="100%" stop-color="#0F1720"/>
    </linearGradient>
    <!-- Viewfinder gradient - electric blue -->
    <linearGradient id="frameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5BB8F5"/>
      <stop offset="100%" stop-color="#2E8FD9"/>
    </linearGradient>
    <!-- Checkmark gradient - vibrant teal-green -->
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <!-- Subtle inner glow -->
    <radialGradient id="glowGrad" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0F1720" stop-opacity="0"/>
    </radialGradient>
    <!-- Shadow for depth -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Soft glow for checkmark -->
    <filter id="checkGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main rounded square background (macOS style) -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bgGrad)"/>
  <!-- Subtle inner glow -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#glowGrad)"/>

  <!-- Viewfinder frame - four corner brackets -->
  <g stroke="url(#frameGrad)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#shadow)">
    <!-- Top-left corner -->
    <path d="M 270,400 L 270,310 Q 270,270 310,270 L 400,270"/>
    <!-- Top-right corner -->
    <path d="M 624,270 L 714,270 Q 754,270 754,310 L 754,400"/>
    <!-- Bottom-left corner -->
    <path d="M 270,560 L 270,650 Q 270,690 310,690 L 400,690"/>
    <!-- Bottom-right corner (slightly faded to make room for check badge) -->
    <path d="M 624,690 L 680,690" opacity="0.4"/>
    <path d="M 754,560 L 754,600" opacity="0.4"/>
  </g>

  <!-- Subtle crosshair lines in center -->
  <g stroke="#5BB8F5" stroke-width="2" opacity="0.25">
    <line x1="480" y1="480" x2="544" y2="480"/>
    <line x1="512" y1="448" x2="512" y2="512"/>
  </g>
  <!-- Center dot -->
  <circle cx="512" cy="480" r="5" fill="#5BB8F5" opacity="0.5"/>

  <!-- Small photo thumbnails hint (stacked, top-left area) -->
  <g opacity="0.15">
    <rect x="160" y="160" width="70" height="52" rx="8" fill="none" stroke="#5BB8F5" stroke-width="2.5"/>
    <rect x="175" y="148" width="70" height="52" rx="8" fill="none" stroke="#5BB8F5" stroke-width="2"/>
  </g>

  <!-- Checkmark badge - positioned bottom-right, overlapping the viewfinder corner -->
  <g filter="url(#checkGlow)">
    <!-- Dark ring behind for contrast -->
    <circle cx="720" cy="720" r="135" fill="#0F1720"/>
    <!-- Green circle -->
    <circle cx="720" cy="720" r="115" fill="url(#checkGrad)"/>
    <!-- Checkmark -->
    <path d="M 662,720 L 703,762 L 778,678"
          stroke="#fff" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>